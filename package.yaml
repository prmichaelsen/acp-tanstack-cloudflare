# package.yaml
name: tanstack-cloudflare
version: 1.1.0
description: TanStack + Cloudflare patterns and utilities for ACP projects
author: Patrick Michaelsen
license: MIT
homepage: https://github.com/prmichaelsen/acp-tanstack-cloudflare
repository: https://github.com/prmichaelsen/acp-tanstack-cloudflare.git

# Release configuration
release:
  branch: main

# Package contents
# Add files here as you create them
# Use @acp.pattern-create, @acp.command-create, @acp.design-create
# These commands automatically update this section
contents:
  patterns:
    - name: tanstack-cloudflare.library-services.md
    - name: tanstack-cloudflare.ssr-preload.md
    - name: tanstack-cloudflare.user-scoped-collections.md
  
  commands:
    - name: tanstack-cloudflare.deploy.md
    - name: tanstack-cloudflare.tail.md
  
  designs: []

# Compatibility
requires:
  acp: >=2.8.0

# Tags for discovery
tags:
  - tanstack
  - cloudflare
  - fullstack
  - typescript
