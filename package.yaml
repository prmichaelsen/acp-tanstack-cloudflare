# package.yaml
name: tanstack-cloudflare
version: 1.1.0
description: TanStack + Cloudflare patterns and utilities for ACP projects
author: Patrick Michaelsen
license: MIT
homepage: https://github.com/prmichaelsen/acp-tanstack-cloudflare
repository: https://github.com/prmichaelsen/acp-tanstack-cloudflare.git

# Release configuration
release:
  branch: main

# Package contents
# Add files here as you create them
# Use @acp.pattern-create, @acp.command-create, @acp.design-create
# These commands automatically update this section
contents:
  patterns:
    - file: agent/patterns/tanstack-cloudflare.library-services.md
      name: library-services
      description: Service layer architecture for data access operations with database and API service separation
    - file: agent/patterns/tanstack-cloudflare.ssr-preload.md
      name: ssr-preload
      description: Server-side data preloading using TanStack Router's beforeLoad to eliminate loading states
    - file: agent/patterns/tanstack-cloudflare.user-scoped-collections.md
      name: user-scoped-collections
      description: Firestore subcollection pattern for user-specific data isolation and security
  
  commands:
    - file: agent/commands/tanstack-cloudflare.deploy.md
      name: deploy
      description: Build and deploy TanStack Start application to Cloudflare Workers using local environment configuration
    - file: agent/commands/tanstack-cloudflare.tail.md
      name: tail
      description: Stream real-time logs from deployed TanStack Start application on Cloudflare Workers
  
  designs: []

# Compatibility
requires:
  acp: ">=2.8.0"

# Tags for discovery
tags:
  - tanstack
  - cloudflare
  - fullstack
  - typescript
